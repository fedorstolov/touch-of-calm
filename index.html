      // Единый обработчик событий (делегирование)
      function handleClick(e) {
        const target = e.target;
        const actionBtn = target.closest('[data-action]');
        if (!actionBtn) return;

        e.preventDefault();
        const action = actionBtn.dataset.action;
        const section = actionBtn.dataset.section;
        const page = actionBtn.dataset.page;

        switch (action) {
          case 'scroll-to-section':
            if (section) {
              scrollToSection(section);
              if (menuOpen) {
                menuOpen = false;
                render();
              }
            }
            break;
          case 'set-page':
            if (page) setCurrentPage(page);
            break;
          case 'toggle-menu':
            menuOpen = true;
            render();
            break;
          case 'close-menu':
            menuOpen = false;
            render();
            break;
          case 'scroll-to-top':
            window.scrollTo({ top: 0, behavior: 'smooth' });
            break;
          case 'open-calendly':
            openCalendly();
            break;
          default: break;
        }
      }

      // Инициализация приложения
      function initApp() {
        // Рендерим начальную страницу
        currentPage = 'home';
        render();

        // Один раз вешаем глобальный обработчик кликов
        document.addEventListener('click', handleClick);
      }

      // Запуск после полной загрузки DOM
      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', initApp);
      } else {
        initApp();
      }
    })();
